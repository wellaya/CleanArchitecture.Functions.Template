name: Validate Template
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - run: dotnet new install ./content
      - run: dotnet new ca-func -n SmokeTest -o /tmp/SmokeTest
      - run: dotnet build /tmp/SmokeTest
      - run: dotnet new uninstall ./content